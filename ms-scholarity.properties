
server.port=8080
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# 2. JPA / HIBERNATE CONFIGURATION
# ===============================
# Tells Hibernate to auto-create and update your tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Shows the actual SQL queries Hibernate is running in your console (great for debugging!)
spring.jpa.show-sql=true

# Tells Hibernate which SQL dialect to use to talk to H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# 3. H2 CONSOLE CONFIGURATION
# ===============================
# Enables the web interface to view your database
spring.h2.console.enabled=true

# The URL path to access the console (e.g., http://localhost:8080/h2-console)
spring.h2.console.path=/h2-console
eureka.client.register-with-eureka =true
eureka.client.service-url.defaultZone=http://localhost:8888/eureka



